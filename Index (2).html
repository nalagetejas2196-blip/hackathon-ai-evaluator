<!DOCTYPE html>
<html>
<head>
  <title>AI Hackathon Evaluator</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    text-align: center;
    padding: 30px;
  }
  h1 {
    color: #ff6600;
  }
  textarea {
    width: 400px;
    height: 80px;
    margin: 10px 0;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  button {
    background-color: #28a745;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover {
    background-color: #218838;
  }
  #result {
    margin-top: 20px;
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>
  <h1>Hackathon Submission</h1>

  <textarea placeholder="Enter Problem Statement" rows="4" cols="50"></textarea><br><br>
  <textarea placeholder="Enter Solution" rows="4" cols="50"></textarea><br><br>

  <button onclick="evaluate()">Evaluate</button>

  <h2 id="result"></h2>

  <script>
    function evaluate() {
      document.getElementById("result").innerText =
        "Innovation: 8/10 | Feasibility: 7/10 | Feedback: Strong idea, improve scalability.";
    }
  </script>
</body>
</html>
